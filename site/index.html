<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rajan's Toolkits</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-QN3P3HSD90"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-QN3P3HSD90');
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #16181f;
      --border: #23262f;
      --text: #e2e8f0;
      --muted: #6b7280;
      --accent: #6366f1;
    }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    /* ── Header ── */
    header {
      padding: 3.5rem 0 2.5rem;
    }

    .header-eyebrow {
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 500;
      letter-spacing: -0.03em;
      line-height: 1.1;
      color: var(--text);
    }

    header h1 span {
      color: var(--muted);
      font-weight: 300;
    }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-top: 1.25rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
    }

    .meta-count {
      font-size: 0.68rem;
      color: var(--muted);
    }

    .meta-count strong {
      color: var(--text);
      font-weight: 500;
    }

    /* ── Grid ── */
    main { padding-bottom: 5rem; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1px;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      padding: 1.75rem 1.75rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0;
      transition: background 0.15s;
      cursor: pointer;
      position: relative;
      text-decoration: none;
      color: inherit;
    }

    .card:hover { background: #1c1f2a; }

    .card-accent {
      width: 28px;
      height: 2px;
      border-radius: 2px;
      margin-bottom: 1.1rem;
    }

    .card h2 {
      font-size: 1rem;
      font-weight: 500;
      line-height: 1.35;
      letter-spacing: -0.01em;
      margin-bottom: 0.5rem;
    }

    .card-tag {
      font-size: 0.58rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 400;
      margin-bottom: 0.85rem;
    }

    .card p {
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.65;
      flex: 1;
      margin-bottom: 1.4rem;
      font-weight: 300;
    }

    .card-link {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: gap 0.15s;
    }

    .card:hover .card-link { gap: 10px; }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 1.5rem 0;
      font-size: 0.62rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    @media (max-width: 500px) {
      .grid { grid-template-columns: 1fr; }
      header h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="header-eyebrow">adhd-tools.artisticmonk.in</div>
      <h1>Rajan's <span>Toolkits</span></h1>
      <div class="header-meta">
        <div class="meta-count"><strong id="countEl">0</strong> tools</div>
      </div>
    </header>

    <main>
      <div class="grid" id="grid"></div>
    </main>

    <footer>built for my brain · updated as needed</footer>
  </div>

  <script>
    // ── ADD NEW TOOLKITS HERE ──────────────────────────────────────────────
    const toolkits = [
      {
        title: "ADHD SDE Toolkit",
        desc: "Task taxonomy and strategies for every brain mode — deep focus, async, collaboration, ops.",
        file: "toolkits/adhd_sde_toolkit.html",
        tag: "ADHD",
        color: "#ff6b35",
      },
      {
        title: "Good Enough for Now",
        desc: "Architecture session guide. Anchor scope, park rabbit holes, commit to incomplete maps.",
        file: "toolkits/good_enough_now.html",
        tag: "Architecture",
        color: "#c84b2f",
      },
    ];
    // ──────────────────────────────────────────────────────────────────────

    const grid = document.getElementById("grid");
    document.getElementById("countEl").textContent = toolkits.length;

    toolkits.forEach(({ title, desc, file, tag, color }) => {
      const c = color || "#6366f1";
      const card = document.createElement("a");
      card.className = "card";
      card.href = file;
      card.target = "_blank";
      card.rel = "noopener";
      card.innerHTML = `
        <div class="card-accent" style="background:${c}"></div>
        <h2>${title}</h2>
        <div class="card-tag" style="color:${c}">${tag}</div>
        <p>${desc}</p>
        <div class="card-link" style="color:${c}">Open <span>→</span></div>`;
      grid.appendChild(card);
    });
  </script>
</body>
</html>
